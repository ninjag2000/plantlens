
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantLens - Plant Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link rel="stylesheet" href="https://esm.sh/react-image-crop/dist/ReactCrop.css" />
    <style>
      /* Using a class now for dark mode */
      .dark body {
        background-color: #1e221f;
        color: #f3f4f6;
      }
      body {
        background-color: #f8f9fa; /* Light mode background */
        color: #1f2937; /* Light mode text */
        overscroll-behavior: none;
      }
      .ReactCrop__crop-selection {
        border: 2px solid rgba(52, 211, 153, 0.7); /* Green-400 */
      }
      
      /* Hide scrollbar for Chrome, Safari and Opera */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Hide scrollbar for IE, Edge and Firefox */
      .hide-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* Identifying animation styles */
      .plant-stem {
          stroke-dasharray: 60;
          stroke-dashoffset: 60;
          animation: draw 1.5s ease-in-out forwards;
      }
      .plant-leaf1 {
          stroke-dasharray: 80;
          stroke-dashoffset: 80;
          animation: draw 1.5s ease-in-out 0.5s forwards;
      }
      .plant-leaf2 {
          stroke-dasharray: 80;
          stroke-dashoffset: 80;
          animation: draw 1.5s ease-in-out 0.8s forwards;
      }
      @keyframes draw {
          to {
              stroke-dashoffset: 0;
          }
      }
      
      /* General fade-in */
      .animate-fade-in {
          animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Onboarding Animations */
      .animate-pill-indicator {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .animate-content-enter {
        animation: content-enter 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes content-enter {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      /* Splash Screen Animations */
      .animate-splash-item {
        animation: splash-item-enter 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        opacity: 0;
      }
      @keyframes splash-item-enter {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      /* Scanning Animations */
      @keyframes scan-down { 
        0% { top: -20%; opacity: 0; } 
        10% { opacity: 1; } 
        90% { opacity: 1; } 
        100% { top: 120%; opacity: 0; } 
      }
      .animate-scan-down { animation: scan-down 2s linear infinite; }
      
      @keyframes scan-line { 
        0% { top: -20%; } 
        100% { top: 120%; } 
      }
      .animate-scan-line { animation: scan-line 2s linear infinite; }

      @keyframes slide-up {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-up { animation: slide-up 0.5s ease-out forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react-image-crop": "https://esm.sh/react-image-crop@^11.0.6",
    "jspdf": "https://esm.sh/jspdf@^2.5.1"
  }
}
</script>
<script>
  // Prevents Flash of Incorrect Theme (FOIT)
  if (localStorage.getItem('plantlens_theme') === 'dark') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
